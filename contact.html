<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/jpeg" href="GCfavico.jpg">
  <title>Contact Us - Public Chat App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="js/main.js"></script>
  <script src="script/theme.js" defer></script>
  <!-- google fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Double:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-main">
    <div class="container">
      <header class="d-flex flex-wrap justify-content-between align-items-center py-3 mb-4 border-bottom">
        <a href="index.html" class="d-flex align-items-center text-dark text-decoration-none">
          <!-- <svg class="bi me-2" width="40" height="32"><use xlink:href="#bootstrap"></use></svg> -->
          <span class="fs-2 bitcount-prop-double burnt-peach">Gubb Chat</span>
        </a>

        <button class="burger-btn d-md-none" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
          <span class="burger-bar"></span>
          <span class="burger-bar"></span>
          <span class="burger-bar"></span>
        </button>

        <div class="collapse w-100 d-md-flex justify-content-end" id="navMenu">
          <ul class="nav nav-pills align-items-md-center flex-column flex-md-row align-items-start mt-2 mt-md-0">
            <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
            <li class="nav-item"><a href="contact.html" class="nav-link active" aria-current="page">Contact us</a></li>
            <li class="nav-item"><a href="about.html" class="nav-link">About</a></li>
            <li class="nav-item ms-md-2" id="loginItem"><button id="loginBtn" class="btn btn-outline-secondary btn-sm">Sign in with Google</button></li>
            <li class="nav-item ms-md-2" id="logoutItem" style="display:none"><button id="logoutBtn" class="btn btn-outline-danger btn-sm">Sign out</button></li>
            <li class="nav-item ms-md-2">
              <button id="themeToggle" class="btn btn-burnt-peach btn-sm" type="button">Light mode</button>
            </li>
          </ul>
        </div>
      </header>
    </div>
  </div>

  <div class="container text-light">
    <h1 class="white">Contact Us</h1>
    
    <section class="content">
      <p>Have a question, suggestion, or feedback? We'd love to hear from you! Fill out the form below and we'll get back to you as soon as possible.</p>

      <form id="contactForm" class="contact-form">
        <div class="mb-3">
          <label for="name" class="form-label">Name *</label>
          <input type="text" id="name" name="name" class="form-control" required>
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Email Address *</label>
          <input type="email" id="email" name="email" class="form-control" required>
        </div>

        <div class="mb-3">
          <label for="subject" class="form-label">Subject *</label>
          <input type="text" id="subject" name="subject" class="form-control" required>
        </div>

        <div class="mb-3">
          <label for="message" class="form-label">Message *</label>
          <textarea id="message" name="message" rows="6" class="form-control" required></textarea>
        </div>

        <button type="submit" class="btn btn-burnt-peach">Send Message</button>
      </form>

      <div id="contactMessage" class="alert" style="display:none;"></div>

      <div class="contact-info">
       
        <!--  lägga socialmedia icon -->
      </div>
    </section>
  </div>

  <div class="container">
    <footer class="d-flex flex-wrap justify-content-between align-items-center py-3 my-4 border-top">
      <div class="col-md-6 d-flex align-items-center">
        <span class="text-muted">&copy; 2026 Gubb Chat</span>
      </div>

      <ul class="nav col-md-6 justify-content-end list-unstyled d-flex footer-social">
        <li class="ms-3"><a class="text-muted" href="#" aria-label="Follow us on X"><i class="bi bi-twitter-x"></i></a></li>
        <li class="ms-3"><a class="text-muted" href="#" aria-label="Follow us on Instagram"><i class="bi bi-instagram"></i></a></li>
        <li class="ms-3"><a class="text-muted" href="#" aria-label="Follow us on Facebook"><i class="bi bi-facebook"></i></a></li>
      </ul>
    </footer>
  </div>

   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="script/authNav.js" type="module" defer></script>
  </body>
</html>
